name: Release build

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  x86_64-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-cache: false
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.zig-cache
          key: zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon', 'build.zig') }}
          restore-keys: |
            zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
            zig-local-${{ runner.os }}-
      - name: Clear stale Zig package store
        run: rm -rf .zig-cache/p
        shell: bash
      - run: zig build
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-linux
          path: zig-out/bin

  x86_64-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-cache: false
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.zig-cache
          key: zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon', 'build.zig') }}
          restore-keys: |
            zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
            zig-local-${{ runner.os }}-
      - name: Clear stale Zig package store
        run: Remove-Item -Recurse -Force .zig-cache/p -ErrorAction SilentlyContinue
        shell: pwsh
      - run: zig build
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-windows
          path: zig-out/bin

  arm64-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-cache: false
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.zig-cache
          key: zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon', 'build.zig') }}
          restore-keys: |
            zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
            zig-local-${{ runner.os }}-
      - name: Clear stale Zig package store
        run: rm -rf .zig-cache/p
        shell: bash
      - run: zig build
      - uses: actions/upload-artifact@v4
        with:
          name: arm64-macos
          path: zig-out/bin
