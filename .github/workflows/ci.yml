name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "doc/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
  pull_request:
    paths-ignore:
      - "doc/**"
      - "README.md"
      - "**.md"
      - "LICENSE**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-cache: false
      - run: zig build check --summary all

  test:
    name: Tests (${{ matrix.name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include: ${{ github.event_name == 'push' && fromJSON('[{"os":"ubuntu-latest","name":"Linux"}]') || fromJSON('[{"os":"ubuntu-latest","name":"Linux"},{"os":"windows-latest","name":"Windows"},{"os":"macos-14","name":"macOS"}]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-cache: false
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.zig-cache
          key: zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon', 'build.zig') }}
          restore-keys: |
            zig-local-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
            zig-local-${{ runner.os }}-
      - name: Clear stale Zig package store
        run: rm -rf .zig-cache/p
        shell: bash
      - run: zig build test --summary all
